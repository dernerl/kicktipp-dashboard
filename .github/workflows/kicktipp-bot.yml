name: Kicktipp Bot

# Replaces the local launchd cron (com.kicktipp-ai.bot.plist) — see ADR 0009.
# Runs the llm-strategy bot, refreshes the dashboard's ranking/odds history,
# and uploads data/*.jsonl to a private Vercel Blob store so the hosted
# dashboard (api/data.py) can read it without any Tippkreis data ever
# touching this (potentially public/template) repo's git history — see
# ADR 0010.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dependencies
        run: uv sync

      - name: Install Claude Code CLI and Vercel CLI
        run: npm install -g @anthropic-ai/claude-code vercel

      - name: Run bot (submit tips, capture odds, update scores)
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: uv run python main.py --strategy llm --max-hours-ahead 30

      - name: Rebuild dashboard ranking history
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: uv run python ranking_history.py

      - name: Write cron heartbeat
        if: always()
        run: |
          mkdir -p data
          if [ "${{ job.status }}" = "success" ]; then ok=true; else ok=false; fi
          printf '{"last_attempt_at": "%s", "ok": %s}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$ok" > data/status.json

      # Uploads whichever data/*.jsonl files exist to the private Blob store
      # under data/<filename> — matching the pathnames dashboard_data.py
      # expects. --allow-overwrite because these files evolve run over run;
      # --access private means no public URL is ever generated for them.
      - name: Upload data to Vercel Blob
        if: always()
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          for f in data/*.jsonl data/status.json; do
            [ -f "$f" ] || continue
            vercel blob put "$f" \
              --pathname "data/$(basename "$f")" \
              --access private \
              --allow-overwrite \
              --rw-token "$BLOB_READ_WRITE_TOKEN" \
              --store-id "${{ secrets.BLOB_STORE_ID }}" \
              --token "${{ secrets.VERCEL_TOKEN }}"
          done
