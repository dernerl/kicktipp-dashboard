<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kicktipp Dashboard</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel2: #222c38; --line: #2c3744;
    --text: #e6edf3; --muted: #8b98a5; --accent: #f5c542; --self: #f5c542;
    --green: #3fb950; --green-dim: #1d3326; --red: #f85149; --red-dim: #3a1f1f;
    --blue: #58a6ff; --amber: #e3a008;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 22px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 22px; }
  header .sub { color: var(--muted); font-size: 14px; }
  header .spacer { flex: 1; }
  button.ghost {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  button.ghost:hover { border-color: var(--accent); }
  main { max-width: 1180px; margin: 0 auto; padding: 24px 28px 80px; }
  section { margin-bottom: 44px; }
  h2 { font-size: 17px; margin: 0 0 4px; }
  .section-hint { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }

  /* --- Bump chart --- */
  .chart-wrap { display: grid; grid-template-columns: 1fr 250px; gap: 20px; }
  @media (max-width: 880px) { .chart-wrap { grid-template-columns: 1fr; } }
  svg { width: 100%; height: auto; display: block; }
  .bump-line { fill: none; stroke-width: 2.5; opacity: .35; transition: opacity .2s; stroke-linejoin: round; stroke-linecap: round; }
  .bump-line.self { stroke: var(--self); stroke-width: 4; opacity: 1; }
  .bump-line.hi { opacity: 1; stroke-width: 3.5; }
  .bump-dot { transition: opacity .2s; }
  .axis-label { fill: var(--muted); font-size: 11px; }
  .grid { stroke: var(--line); stroke-width: 1; opacity: .5; }
  .marker-line { stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 4 4; opacity: .6; }

  .controls { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
  .controls input[type=range] { flex: 1; accent-color: var(--accent); }
  .controls .st-label { font-weight: 600; min-width: 96px; }
  .play-btn {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); cursor: pointer; font-size: 15px;
  }
  .play-btn:hover { border-color: var(--accent); }
  .bonus-toggle { display: inline-flex; align-items: center; gap: 7px; margin-top: 12px; color: var(--muted); font-size: 13px; cursor: pointer; user-select: none; }
  .bonus-toggle input { accent-color: var(--accent); cursor: pointer; }

  .standings { font-size: 13.5px; }
  .standings .row { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 6px; }
  .standings .row.self { background: rgba(245,197,66,.14); }
  .standings .pos { width: 22px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .standings .swatch { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .standings .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .standings .pts { color: var(--muted); font-variant-numeric: tabular-nums; }
  .standings .mv { width: 26px; font-size: 11px; text-align: right; }
  .mv.up { color: var(--green); } .mv.down { color: var(--red); } .mv.same { color: var(--muted); }

  /* --- Crazy tips --- */
  .crazy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 760px) { .crazy-grid { grid-template-columns: 1fr; } }
  .crazy-col h3 { font-size: 14px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .tipcard {
    border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; background: var(--panel2);
  }
  .tipcard.exact { border-left: 4px solid var(--green); }
  .tipcard.miss  { border-left: 4px solid var(--red); }
  .tipcard .teams { flex: 1; font-size: 13.5px; }
  .tipcard .teams b { font-weight: 600; }
  .tipcard .meta { color: var(--muted); font-size: 12px; }
  .score { font-variant-numeric: tabular-nums; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
  .score.tip { background: var(--panel); border: 1px solid var(--line); }
  .score.res { background: var(--green-dim); color: var(--green); }
  .tipcard.miss .score.res { background: var(--red-dim); color: var(--red); }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--line); color: var(--muted); }
  .badge.llm { color: var(--blue); border-color: var(--blue); }
  .badge.random { color: var(--amber); border-color: var(--amber); }
  .who { font-weight: 600; color: var(--text); }
  .who.self { color: var(--self); }
  .rare { color: var(--accent); font-weight: 600; }

  /* --- Awards --- */
  .awards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 14px; }
  .award { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px; display: flex; flex-direction: column; gap: 5px; }
  .award.self { border-color: var(--self); box-shadow: inset 0 0 0 1px var(--self); }
  .award .emoji { font-size: 28px; line-height: 1; }
  .award .a-title { font-size: 14px; font-weight: 700; }
  .award .a-desc { color: var(--muted); font-size: 11.5px; line-height: 1.4; }
  .award .a-winner { margin-top: 5px; font-size: 14px; }
  .award .a-winner .nm { font-weight: 700; }
  .award .a-winner .nm.self { color: var(--self); }
  .award .a-value { color: var(--accent); font-weight: 700; }
  .award .a-ru { color: var(--muted); font-size: 11.5px; }

  /* --- Personal --- */
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; min-width: 150px; }
  .stat .k { color: var(--muted); font-size: 12px; }
  .stat .v { font-size: 24px; font-weight: 700; margin-top: 2px; }
  .stat .v small { font-size: 13px; color: var(--muted); font-weight: 400; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filters button {
    background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px;
  }
  .filters button.active { color: var(--text); border-color: var(--accent); background: var(--panel2); }

  table.tips { width: 100%; border-collapse: collapse; }
  table.tips th { text-align: left; color: var(--muted); font-weight: 500; font-size: 12px; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  table.tips td { padding: 9px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.tips tr.has-why { cursor: pointer; }
  table.tips tr.has-why:hover td { background: var(--panel2); }
  .st-pts { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 6px; font-weight: 700; font-size: 13px; }
  .st-exact { background: var(--green-dim); color: var(--green); }
  .st-diff { background: #2a3a4d; color: var(--blue); }
  .st-tendency { background: #3a3320; color: var(--amber); }
  .st-miss { background: var(--red-dim); color: var(--red); }
  .st-open { background: var(--panel2); color: var(--muted); }
  .score.res-exact { background: var(--green-dim); color: var(--green); }
  .score.res-diff { background: #2a3a4d; color: var(--blue); }
  .score.res-tendency { background: #3a3320; color: var(--amber); }
  .score.res-miss { background: var(--red-dim); color: var(--red); }
  .score.res-open { background: var(--panel2); color: var(--muted); }
  .outcome { display: inline-block; padding: 2px 9px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .why-row td { background: #131922; }
  .why { white-space: pre-wrap; font-size: 13px; color: var(--text); line-height: 1.55; padding: 6px 4px; max-height: 360px; overflow: auto; }
  .why-run { color: var(--muted); font-size: 11.5px; margin-bottom: 8px; }
  .caret { color: var(--muted); font-size: 11px; }
  .nowrap { white-space: nowrap; }
  .loading { color: var(--muted); padding: 40px; text-align: center; }

  /* --- Password gate --- */
  .pw-overlay {
    position: fixed; inset: 0; background: rgba(10,13,17,.94);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .pw-overlay.pw-hidden { display: none; }
  .pw-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 36px 32px; width: 300px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .pw-card .pw-icon { font-size: 30px; margin-bottom: 6px; }
  .pw-card h2 { margin: 0 0 4px; font-size: 17px; }
  .pw-card p { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
  .pw-card input {
    width: 100%; padding: 11px 14px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 14px; margin-bottom: 14px;
    font-family: inherit;
  }
  .pw-card input:focus { outline: none; border-color: var(--accent); }
  .pw-card button {
    width: 100%; padding: 11px; border-radius: 9px; border: none;
    background: var(--accent); color: #1a1400; font-weight: 700; cursor: pointer;
    font-size: 14px; font-family: inherit;
  }
  .pw-card button:hover { filter: brightness(1.08); }
  .pw-card .pw-error {
    color: var(--red); font-size: 12.5px; margin-top: 12px; min-height: 16px;
  }
</style>
</head>
<body>
<div class="pw-overlay pw-hidden" id="pwOverlay">
  <div class="pw-card">
    <div class="pw-icon">⚽</div>
    <h2>Kicktipp Dashboard</h2>
    <p>Passwort erforderlich</p>
    <input type="password" id="pwInput" placeholder="Passwort" autocomplete="current-password">
    <button id="pwSubmit">Weiter</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>
<header>
  <h1>⚽ Kicktipp Dashboard</h1>
  <span class="sub" id="subtitle">lädt …</span>
  <span class="sub" id="statusline"></span>
  <span class="spacer"></span>
  <button class="ghost" id="refresh">↻ Tabelle aktualisieren</button>
</header>
<main id="app"><div class="loading">Lade Daten …</div></main>

<script>
const PALETTE = ["#58a6ff","#3fb950","#db61a2","#e3a008","#a371f7","#ff7b72",
                 "#56d4dd","#d2a8ff","#7ee787","#ffa657","#79c0ff","#f0883e"];

let DATA = null;
let rafId = null, lastT = null;

async function load() {
  const stored = sessionStorage.getItem("dashboardPassword") || "";
  const headers = stored ? { "X-Dashboard-Password": stored } : {};
  const r = await fetch("/api/data", { headers });
  if (r.status === 401) {
    const hadStored = stored.length > 0;
    sessionStorage.removeItem("dashboardPassword");
    showPasswordPrompt(hadStored);
    return;
  }
  hidePasswordPrompt();
  DATA = await r.json();
  render();
}

function showPasswordPrompt(wasWrong) {
  document.getElementById("pwOverlay").classList.remove("pw-hidden");
  document.getElementById("pwError").textContent = wasWrong ? "Falsches Passwort." : "";
  const input = document.getElementById("pwInput");
  input.value = "";
  input.focus();
}

function hidePasswordPrompt() {
  document.getElementById("pwOverlay").classList.add("pw-hidden");
}

function submitPassword() {
  const pw = document.getElementById("pwInput").value;
  if (!pw) return;
  sessionStorage.setItem("dashboardPassword", pw);
  load();
}

document.getElementById("pwSubmit").onclick = submitPassword;
document.getElementById("pwInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitPassword();
});

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const communityName = DATA.community_name || "Kicktipp";
  document.getElementById("subtitle").textContent = DATA.local
    ? `${DATA.tips.length} Tipps · ${communityName}`
    : communityName;
  document.getElementById("refresh").style.display = DATA.local ? "" : "none";
  renderStatusBanner();
  app.appendChild(sectionBump());
  app.appendChild(sectionCrazy());
  app.appendChild(sectionAwards());
  if (DATA.local) app.appendChild(sectionPersonal());
  initBump();
}

/* ---------------- Staleness banner ---------------- */
function renderStatusBanner() {
  const el = document.getElementById("statusline");
  if (!DATA.status) { el.textContent = ""; return; }
  const { last_attempt_at, ok } = DATA.status;
  const ageMs = Date.now() - new Date(last_attempt_at).getTime();
  const ageH = ageMs / 3_600_000;
  const stale = !ok || ageH > 8;
  el.textContent = ok === false
    ? `⚠ letzter Bot-Lauf fehlgeschlagen (${last_attempt_at})`
    : `Daten zuletzt aktualisiert: ${last_attempt_at}${stale ? " ⚠ länger her als erwartet" : ""}`;
  el.style.color = stale ? "var(--red)" : "var(--muted)";
}

/* ---------------- Section A: position over time ---------------- */
function sectionBump() {
  const sec = el("section");
  sec.innerHTML = `
    <h2>Positionsverlauf</h2>
    <p class="section-hint">Wer stand wann auf welchem Platz? Ein Schritt = ein einzelnes Spiel; der aktuell schon feststehende Bonus (z.B. Gruppensieger) zählt nur beim letzten Punkt dazu, da der genaue Zeitpunkt je Frage unbekannt ist. Schieberegler ziehen oder ▶ drücken.</p>
    <div class="panel">
      <div class="chart-wrap">
        <div>
          <svg id="bump" viewBox="0 0 720 420" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="controls">
            <button class="play-btn" id="play">▶</button>
            <input type="range" id="slider" min="1" max="1" value="1" step="1">
            <span class="st-label" id="stLabel"></span>
          </div>
          <label class="bonus-toggle"><input type="checkbox" id="bonusToggle" checked> Bonusfragen einrechnen</label>
        </div>
        <div class="standings" id="standings"></div>
      </div>
    </div>`;
  return sec;
}

// smooth S-curve path through points: horizontal-tangent cubic beziers, so the
// line flows between ranks without overshooting above/below either endpoint.
function smoothPath(pts) {
  if (!pts.length) return "";
  let d = `M ${pts[0].x},${pts[0].y}`;
  for (let i=1; i<pts.length; i++) {
    const xm = (pts[i-1].x + pts[i].x) / 2;
    d += ` C ${xm},${pts[i-1].y} ${xm},${pts[i].y} ${pts[i].x},${pts[i].y}`;
  }
  return d;
}

// standard competition ranking (1,2,2,4) by points desc, ties stable by name
function competitionRank(arr) {
  arr.forEach(s => s.rank = 1 + arr.filter(o => o.points > s.points).length);
  return arr.sort((a,b) => a.rank - b.rank || a.player.localeCompare(b.player));
}

function bumpModel(includeBonus) {
  let tl = DATA.timeline.slice().sort((a,b)=>a.ordinal-b.ordinal);
  // The pre-tournament Bonusfragen step (match_index -1) only makes sense
  // when bonus is counted; the current bonus itself is folded into the
  // latest real step's "bonus" field (see ranking_history.py), not its own step.
  if (!includeBonus) tl = tl.filter(t => t.match_index !== -1);
  // recompute each step's standings for the chosen mode (with/without bonus)
  const steps = tl.map(t => {
    const standings = t.standings.map(s => ({
      player: s.player, is_self: s.is_self,
      points: includeBonus ? s.points : (s.points - (s.bonus || 0)),
    }));
    competitionRank(standings);
    return { ...t, standings };
  });
  const ords = steps.map(s => s.ordinal);
  const stepByOrd = {};
  steps.forEach(s => stepByOrd[s.ordinal] = s);
  const byPlayer = {};
  steps.forEach(s => s.standings.forEach(p => {
    (byPlayer[p.player] = byPlayer[p.player] || {})[s.ordinal] = p;
  }));
  const last = steps[steps.length-1];
  const finalOrder = last.standings.slice().sort((a,b)=>a.rank-b.rank);
  const players = finalOrder.map(s => s.player);
  const colorOf = {};
  finalOrder.forEach((s,i) => colorOf[s.player] = PALETTE[i % PALETTE.length]);
  const boundaries = [];
  let prevSt = null;
  steps.forEach(s => { if (s.spieltag_index !== prevSt) { boundaries.push(s); prevSt = s.spieltag_index; } });
  const self = (last.standings.find(s => s.is_self) || {}).player;
  return { timeline: steps, ords, stepByOrd, byPlayer, players, colorOf, boundaries,
           nplayers: players.length, self, lastOrd: last.ordinal };
}

let BUMP = null;
function initBump(keepOrd) {
  const includeBonus = document.getElementById("bonusToggle").checked;
  BUMP = bumpModel(includeBonus);
  const svg = document.getElementById("bump");
  const W=720, H=420, padL=30, padR=120, padT=18, padB=40;
  const { ords, players, colorOf, byPlayer, boundaries } = BUMP;
  const n = BUMP.nplayers, span = Math.max(1, ords.length-1);
  const xIdx = idx => padL + (W-padL-padR) * idx / span;
  const x = ord => xIdx(ords.indexOf(ord));
  const y = rank => padT + (H-padT-padB) * (rank-1)/(n-1);
  BUMP.x = x; BUMP.xIdx = xIdx; BUMP.y = y; BUMP.svg = svg;

  let h = "";
  for (let r=1; r<=n; r++) h += `<text class="axis-label" x="6" y="${y(r)+4}">${r}</text>`;
  // spieltag boundary gridlines + labels (per Spieltag, not per match — too dense;
  // the Bonus step gets no label so it can't collide with ST1 on the left edge)
  boundaries.forEach(t => {
    if (t.spieltag_index === 0) return;
    h += `<line class="grid" x1="${x(t.ordinal)}" y1="${padT}" x2="${x(t.ordinal)}" y2="${H-padB}"/>`;
    h += `<text class="axis-label" text-anchor="middle" x="${x(t.ordinal)}" y="${H-8}">ST${t.spieltag_index}</text>`;
  });
  h += `<line id="marker" class="marker-line" x1="0" y1="${padT}" x2="0" y2="${H-padB}" style="opacity:0"/>`;
  players.forEach(p => {
    const cls = "bump-line" + (p===BUMP.self?" self":"");
    h += `<path class="${cls}" data-player="${esc(p)}" stroke="${colorOf[p]}" d=""/>`;
  });
  // end labels at the last ordinal, nudged apart so tied ranks don't overlap
  const lastOrd = BUMP.lastOrd, minGap = 13;
  let prevY = -100;
  players.forEach(p => {
    const r = byPlayer[p][lastOrd]; if(!r) return;
    let yy = y(r.rank) + 4;
    if (yy - prevY < minGap) yy = prevY + minGap;
    prevY = yy;
    const bold = p===BUMP.self ? ' font-weight="700"' : '';
    h += `<text x="${x(lastOrd)+8}" y="${yy}" fill="${colorOf[p]}" font-size="11"${bold}>${esc(p)}</text>`;
  });
  // persistent dots — updated each frame, never rebuilt (smoother animation)
  h += `<g id="dots">`;
  players.forEach(p => {
    const big = p===BUMP.self ? 6 : 4;
    h += `<circle class="bump-dot" data-player="${esc(p)}" r="${big}" fill="${colorOf[p]}" stroke="#0f1419" stroke-width="1.5" style="opacity:0"/>`;
  });
  h += `</g>`;
  svg.innerHTML = h;

  // cache element refs so render only touches attributes, not innerHTML
  BUMP.lineEl = {}; BUMP.dotEl = {};
  svg.querySelectorAll(".bump-line").forEach(pl => {
    BUMP.lineEl[pl.dataset.player] = pl;
    pl.addEventListener("mouseenter", () => {
      svg.querySelectorAll(".bump-line").forEach(o => o.classList.remove("hi"));
      if(!pl.classList.contains("self")) pl.classList.add("hi");
    });
  });
  svg.querySelectorAll(".bump-dot").forEach(d => BUMP.dotEl[d.dataset.player] = d);
  BUMP.marker = svg.querySelector("#marker");
  BUMP._standingsOrd = null;

  const slider = document.getElementById("slider");
  slider.min = ords[0]; slider.max = lastOrd;
  const start = (keepOrd != null && ords.includes(keepOrd)) ? keepOrd : lastOrd;
  slider.value = start;
  slider.oninput = () => { stopPlay(); renderPos(ords.indexOf(+slider.value)); };
  document.getElementById("play").onclick = togglePlay;
  document.getElementById("bonusToggle").onchange = () => { stopPlay(); initBump(+slider.value); };
  renderPos(ords.indexOf(start));
}

// render at a fractional position (index into ords) — interpolates rank & x so
// the play animation glides continuously instead of snapping match to match.
function renderPos(pos) {
  const { y, byPlayer, players, ords, stepByOrd, xIdx } = BUMP;
  const lastIdx = ords.length - 1;
  pos = Math.max(0, Math.min(lastIdx, pos));
  BUMP.pos = pos;
  const i0 = Math.floor(pos), i1 = Math.min(lastIdx, i0 + 1), frac = pos - i0;
  const xCur = xIdx(i0) + (xIdx(i1) - xIdx(i0)) * frac;

  players.forEach(p => {
    const pts = [];
    for (let k = 0; k <= i0; k++) {
      const s = byPlayer[p][ords[k]];
      if (s) pts.push({ x: xIdx(k), y: y(s.rank) });
    }
    const s0 = byPlayer[p][ords[i0]], s1 = byPlayer[p][ords[i1]];
    let yCur = null;
    if (s0 && s1) yCur = y(s0.rank) + (y(s1.rank) - y(s0.rank)) * frac;
    else if (s0) yCur = y(s0.rank);
    if (yCur != null && frac > 0) pts.push({ x: xCur, y: yCur });
    BUMP.lineEl[p].setAttribute("d", smoothPath(pts));

    const dot = BUMP.dotEl[p];
    if (yCur == null) dot.style.opacity = 0;
    else { dot.style.opacity = 1; dot.setAttribute("cx", xCur); dot.setAttribute("cy", yCur); }
  });

  BUMP.marker.setAttribute("x1", xCur);
  BUMP.marker.setAttribute("x2", xCur);
  BUMP.marker.style.opacity = .6;

  const near = Math.round(pos), ordNear = ords[near];
  document.getElementById("stLabel").textContent = stepLabel(stepByOrd[ordNear]);
  document.getElementById("slider").value = ordNear;
  if (ordNear !== BUMP._standingsOrd) { drawStandings(ordNear); BUMP._standingsOrd = ordNear; }
}

function drawAt(ord) { renderPos(BUMP.ords.indexOf(ord)); }

function stepLabel(step) {
  if (!step) return "";
  if (step.spieltag_index === 0) return "Start · Bonusfragen";
  return `${step.spieltag_index}. Spieltag`;
}

function drawStandings(ord) {
  const {colorOf, ords, stepByOrd} = BUMP;
  const cur = (stepByOrd[ord] || {standings:[]}).standings;
  const prevOrd = ords.filter(o => o < ord).pop();
  const prevRank = {};
  if (prevOrd != null) (stepByOrd[prevOrd].standings||[]).forEach(s => prevRank[s.player] = s.rank);
  const box = document.getElementById("standings");
  box.innerHTML = cur.map(r => {
    let mv = `<span class="mv same">–</span>`;
    if (r.player in prevRank) {
      const d = prevRank[r.player] - r.rank;
      if (d>0) mv = `<span class="mv up">▲${d}</span>`;
      else if (d<0) mv = `<span class="mv down">▼${-d}</span>`;
    }
    return `<div class="row ${r.is_self?'self':''}">
      <span class="pos">${r.rank}.</span>
      <span class="swatch" style="background:${colorOf[r.player]}"></span>
      <span class="nm">${esc(r.player)}</span>
      <span class="pts">${r.points}</span>${mv}</div>`;
  }).join("");
}

const PLAY_SPEED = 7; // steps per second
function togglePlay() { rafId ? stopPlay() : startPlay(); }
function startPlay() {
  document.getElementById("play").textContent = "⏸";
  const lastIdx = BUMP.ords.length - 1;
  if (BUMP.pos >= lastIdx) BUMP.pos = 0;   // restart from the beginning
  lastT = null;
  const frame = (t) => {
    if (lastT == null) lastT = t;
    const dt = Math.min(0.05, (t - lastT) / 1000); lastT = t;
    const pos = BUMP.pos + PLAY_SPEED * dt;
    if (pos >= lastIdx) { renderPos(lastIdx); stopPlay(); return; }
    renderPos(pos);
    rafId = requestAnimationFrame(frame);
  };
  rafId = requestAnimationFrame(frame);
}
function stopPlay() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.getElementById("play").textContent = "▶";
}

/* ---------------- Section B: crazy tips (whole community) ---------------- */
function sectionCrazy() {
  const sec = el("section");
  const exact = (DATA.crazy.exact || []).slice(0,6);
  const miss  = (DATA.crazy.miss  || []).slice(0,6);
  sec.innerHTML = `
    <h2>Verrückte Tipps</h2>
    <p class="section-hint">Bewertet gegen die Buchmacher-Quote (wo vorhanden), sonst gegen den Tippkreis: exakte Treffer auf krasse Außenseiter (gold) — und klare Favoriten, die verloren und trotzdem getippt wurden (rot).</p>
    <div class="panel"><div class="crazy-grid">
      <div class="crazy-col"><h3>🏆 Wahnsinns-Treffer</h3>${exact.map(crazyCard).join("") || emptyNote}</div>
      <div class="crazy-col"><h3>💥 Komplett daneben</h3>${miss.map(crazyCard).join("") || emptyNote}</div>
    </div></div>`;
  return sec;
}
const emptyNote = `<p class="section-hint">Noch nichts.</p>`;
function crazyCard(t) {
  const who = `<span class="who${t.is_self?' self':''}">${esc(t.player)}</span>`;
  let rare;
  if (t.status === "exact") {
    // who was alone with the tip, combined with how against-the-quote it was
    const excl = t.n_exact === 1 ? "🎯 als Einziger" : `nur ${t.n_exact}/${t.n_players}`;
    rare = (t.odds_based && t.outcome_odds != null)
      ? `${excl} · Quote ${t.outcome_odds}`
      : `${excl} exakt`;
  } else {
    rare = (t.odds_based && t.outcome_odds != null)
      ? `Favorit verlor · Quote ${t.outcome_odds}`
      : `${t.n_tend}/${t.n_players} Tendenz`;
  }
  return `<div class="tipcard ${t.status}">
    <div class="teams">
      <div>${who} · <b>${esc(t.home)}</b> vs <b>${esc(t.away)}</b></div>
      <div class="meta">${esc(t.spieltag_label)} · <span class="rare">${rare}</span></div>
    </div>
    <span class="score tip">${t.home_tip}:${t.away_tip}</span>
    <span class="meta">→</span>
    <span class="score res">${t.home_goals}:${t.away_goals}</span>
  </div>`;
}

/* ---------------- Section B2: awards (whole community) ---------------- */
function sectionAwards() {
  const sec = el("section");
  const awards = DATA.awards || [];
  sec.innerHTML = `
    <h2>🏆 Auszeichnungen</h2>
    <p class="section-hint">Saison-Medaillen für den ganzen Tippkreis — automatisch aus allen Tipps berechnet. Gold umrandet = der Bot hat sie geholt.</p>
    <div class="panel"><div class="awards-grid">${awards.map(awardCard).join("") || emptyNote}</div></div>`;
  return sec;
}
// long tie lists ("A & B & C & …") get collapsed to "N geteilt" so a card stays tidy
function shortWinners(s) {
  const parts = String(s).split(" & ");
  return parts.length > 3 ? `${parts.length} geteilt` : s;
}
function awardCard(a) {
  const winner = `<span class="nm${a.is_self?' self':''}">${esc(shortWinners(a.winner))}</span>`;
  const ru = a.runner_up
    ? `<div class="a-ru">dahinter: ${esc(shortWinners(a.runner_up.player))} · ${esc(a.runner_up.value)}</div>`
    : "";
  return `<div class="award${a.is_self?' self':''}">
    <div class="emoji">${a.emoji}</div>
    <div class="a-title">${esc(a.title)}</div>
    <div class="a-desc">${esc(a.desc)}</div>
    <div class="a-winner">${winner} · <span class="a-value">${esc(a.value)}</span></div>
    ${ru}
  </div>`;
}

/* ---------------- Section C: personal ---------------- */
function sectionPersonal() {
  const sec = el("section");
  sec.innerHTML = `
    <h2>Persönlicher Bereich</h2>
    <p class="section-hint">Alle Tipps des Bots, neueste zuerst — Ergebnis und Tipp eingefärbt nach Ausgang. Zeilen mit 💬 aufklappen für Claudes Begründung.</p>
    <div class="stats" id="stats"></div>
    <div class="panel" id="tipsPanel"></div>`;
  setTimeout(() => { renderStats(); renderTipsTable(); }, 0);
  return sec;
}

function renderStats() {
  const scored = DATA.tips.filter(t => t.status && t.status !== "open");
  const c = { exact: 0, diff: 0, tendency: 0, miss: 0 };
  scored.forEach(t => { if (t.status in c) c[t.status]++; });
  const teil = c.diff + c.tendency;
  const selfRows = DATA.ranking_history.filter(r => r.is_self);
  const selfRank = selfRows.length ? selfRows[selfRows.length - 1] : null;
  const nPlayers = new Set(DATA.ranking_history.map(r => r.player)).size;

  const cards = [];
  if (selfRank) {
    cards.push(stat("Aktueller Platz", `${selfRank.rank}.`, nPlayers ? `von ${nPlayers}` : ""));
    cards.push(stat("Punkte", `${selfRank.points}`, "in der Tabelle"));
  }
  cards.push(stat("Trefferquote", `${c.exact}× exakt`,
    `${teil}× teils · ${c.miss}× daneben (von ${scored.length})`));
  document.getElementById("stats").innerHTML = cards.join("");
}
function stat(k,v,sub){ return `<div class="stat"><div class="k">${k}</div><div class="v">${v} <small>${sub||""}</small></div></div>`; }

const OUTCOME_LABEL = { exact:"Exakt", diff:"Differenz", tendency:"Tendenz", miss:"Daneben", open:"Offen" };
function renderTipsTable() {
  const tips = DATA.tips.slice()
    .sort((a,b)=> (b.kickoff||b.timestamp||"").localeCompare(a.kickoff||a.timestamp||""));  // newest first
  const rows = tips.map((t,i) => {
    const cls = t.reasoning ? "has-why" : "";
    const main = `<tr class="${cls}" data-i="${i}">
      <td class="nowrap"><span class="outcome st-${t.status}">${OUTCOME_LABEL[t.status]||"–"}</span></td>
      <td>${esc(t.spieltag||"")}</td>
      <td><b>${esc(t.home_team)}</b> – <b>${esc(t.away_team)}</b></td>
      <td class="nowrap"><span class="score tip">${t.home_tip}:${t.away_tip}</span></td>
      <td class="nowrap">${t.home_result==null?'<span class="meta">offen</span>':`<span class="score res-${t.status}">${t.home_result}:${t.away_result}</span>`}</td>
      <td class="caret">${t.reasoning?'💬 <span class="caret">▾</span>':''}</td>
    </tr>`;
    const whyRow = t.reasoning ? `<tr class="why-row" data-why="${i}" style="display:none"><td colspan="6">
      <div class="why-run">Lauf ${esc(t.reasoning_run||"")}</div><div class="why">${esc(t.reasoning)}</div></td></tr>` : "";
    return main + whyRow;
  }).join("");
  document.getElementById("tipsPanel").innerHTML = `
    <table class="tips"><thead><tr>
      <th>Ausgang</th><th>Spieltag</th><th>Begegnung</th><th>Tipp</th><th>Ergebnis</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>`;
  document.querySelectorAll("table.tips tr.has-why").forEach(tr => {
    tr.onclick = () => {
      const w = document.querySelector(`tr.why-row[data-why="${tr.dataset.i}"]`);
      if (w) w.style.display = w.style.display==="none" ? "table-row" : "none";
    };
  });
}

/* ---------------- helpers ---------------- */
function el(t){ return document.createElement(t); }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.getElementById("refresh").onclick = async (e) => {
  const btn = e.target; btn.disabled = true; btn.textContent = "↻ aktualisiere …";
  try { await fetch("/api/refresh"); await load(); }
  finally { btn.disabled = false; btn.textContent = "↻ Tabelle aktualisieren"; }
};

load();
</script>
